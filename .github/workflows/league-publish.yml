# ATV-bench Community League — trusted artifact verifier and bot-PR publisher.
#
# A pull_request workflow is PR-rewritable even when its token is read-only. Therefore this
# privileged workflow_run consumer MUST NOT trust the triggering workflow or its metadata
# artifact by default. Before downloading anything it:
#   1. resolves the immutable Actions run and its single commit-associated PR from GitHub;
#   2. proves the exact league.yml blob at the run commit equals the trusted default-branch
#      blob checked by the API at publish time;
#   3. independently derives submitter, PR number/head SHA, run id, opponent, and bot hash
#      from GitHub's run/PR/tree/blob records; and
#   4. requires the base-produced match-meta artifact to equal those derived fields exactly.
#
# Durable history is never pushed directly to the protected default branch. The workflow
# pushes a run-scoped `league/match-<run-id>` branch with a separately provisioned bot token,
# opens a PR, and enables auto-merge. Required checks and CODEOWNERS remain authoritative.

name: league-publish

on:
  workflow_run:
    workflows: [league]
    types: [completed]

# No serializing concurrency group: GitHub cancels older pending runs in a shared group.
# The run-scoped branch plus idempotent re-ingest/retry loop handles reruns safely.
permissions: {}

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read        # write operations use only the separately scoped bot token
      actions: read         # download artifacts from the triggering workflow run
      pull-requests: read   # the separate LEAGUE_BOT_TOKEN creates/manages the bot PR
    steps:
      - name: Checkout trusted publisher code (default branch, never PR head)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify the triggering workflow and derive every trusted match field
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          TRUSTED_WORKFLOW_PATH: .github/workflows/league.yml
        run: |
          python3 - <<'PY'
          import base64
          import binascii
          import hashlib
          import json
          import os
          import pathlib
          import re
          import subprocess
          import sys

          SHA_RE = re.compile(r"[0-9a-f]{40}")
          AUTHOR_RE = re.compile(r"[A-Za-z0-9](?:[A-Za-z0-9]|-(?=[A-Za-z0-9])){0,38}")
          repo = os.environ["REPO"]
          run_id = os.environ["RUN_ID"]
          workflow_path = os.environ["TRUSTED_WORKFLOW_PATH"]

          def fail(message):
              print(f"trusted preflight failed: {message}", file=sys.stderr)
              sys.exit(1)

          def api(endpoint):
              try:
                  raw = subprocess.check_output(
                      [
                          "gh", "api", endpoint,
                          "-H", "Accept: application/vnd.github+json",
                      ],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
                  return json.loads(raw)
              except Exception as exc:
                  fail(f"GitHub API request {endpoint!r} failed: {exc}")

          def full_sha(value, label):
              value = str(value or "").strip().lower()
              if not SHA_RE.fullmatch(value):
                  fail(f"{label} is not a full commit SHA")
              return value

          def tree(commit_sha):
              value = api(f"repos/{repo}/git/trees/{commit_sha}?recursive=1")
              if not isinstance(value, dict) or value.get("truncated") is True:
                  fail(f"tree for {commit_sha} is missing or truncated")
              entries = value.get("tree")
              if not isinstance(entries, list):
                  fail(f"tree for {commit_sha} has no entries")
              return entries

          def exact_entry(entries, path, *, required=True):
              matches = [
                  entry for entry in entries
                  if isinstance(entry, dict) and entry.get("path") == path
              ]
              if len(matches) > 1:
                  fail(f"tree contains duplicate entries for {path}")
              if not matches:
                  if required:
                      fail(f"tree is missing {path}")
                  return None
              return matches[0]

          run = api(f"repos/{repo}/actions/runs/{run_id}")
          if not isinstance(run, dict) or str(run.get("id", "")) != run_id:
              fail("Actions run id does not match the triggering run")
          if run.get("event") != "pull_request":
              fail(f"unexpected triggering event {run.get('event')!r}")
          if run.get("conclusion") != "success":
              fail(f"triggering run conclusion is {run.get('conclusion')!r}")
          if str(run.get("path", "")).split("@", 1)[0] != workflow_path:
              fail(f"triggering workflow path is not {workflow_path}")

          run_sha = full_sha(run.get("head_sha"), "workflow run SHA")
          # The Actions run API often returns an empty pull_requests array for real
          # pull_request runs. Resolve via the immutable run commit instead.
          associated = api(f"repos/{repo}/commits/{run_sha}/pulls")
          if not isinstance(associated, list) or len(associated) != 1:
              fail("triggering commit must be associated with exactly one PR")
          pr = associated[0]
          if not isinstance(pr, dict):
              fail("commit-associated PR is malformed")
          try:
              pr_number = int(pr["number"])
          except (KeyError, TypeError, ValueError):
              fail("commit-associated PR has no valid number")
          if pr_number <= 0:
              fail("commit-associated PR number must be positive")
          submitter = str((pr.get("user") or {}).get("login", "")).strip()
          if not AUTHOR_RE.fullmatch(submitter):
              fail("PR author is missing or is not a canonical GitHub login")

          repository = api(f"repos/{repo}")
          default_branch = str(
              repository.get("default_branch", "") if isinstance(repository, dict) else ""
          ).strip()
          if not default_branch:
              fail("repository API returned no default branch")
          trusted_ref = api(f"repos/{repo}/git/ref/heads/{default_branch}")
          trusted_sha = full_sha(
              (trusted_ref.get("object") or {}).get("sha")
              if isinstance(trusted_ref, dict)
              else None,
              "trusted default-branch SHA",
          )

          run_tree = tree(run_sha)
          trusted_tree = tree(trusted_sha)
          run_workflow = exact_entry(run_tree, workflow_path)
          trusted_workflow = exact_entry(trusted_tree, workflow_path)
          for label, entry in (("run", run_workflow), ("trusted", trusted_workflow)):
              if entry.get("type") != "blob" or entry.get("mode") != "100644":
                  fail(f"{label} workflow is not a regular file")
          if run_workflow.get("sha") != trusted_workflow.get("sha"):
              fail("league.yml was modified by the PR; its artifacts are untrusted")

          bot_path = f"league/submissions/{submitter}/main.py"
          bot_entry = exact_entry(run_tree, bot_path, required=False)
          bot_sha256 = ""
          if bot_entry is not None:
              size = bot_entry.get("size")
              # Mirror the match producer's fail-closed extraction rules. Missing,
              # symlink/gitlink, and oversized bots produce a scored crash with no hash.
              if (
                  bot_entry.get("type") == "blob"
                  and bot_entry.get("mode") in {"100644", "100755"}
                  and isinstance(size, int)
                  and 0 <= size <= 262144
              ):
                  blob_sha = full_sha(bot_entry.get("sha"), "bot blob SHA")
                  blob = api(f"repos/{repo}/git/blobs/{blob_sha}")
                  if not isinstance(blob, dict) or blob.get("encoding") != "base64":
                      fail("bot blob is not base64 encoded")
                  try:
                      bot_bytes = base64.b64decode(
                          str(blob.get("content", "")).encode("ascii"),
                          validate=True,
                      )
                  except (UnicodeEncodeError, binascii.Error) as exc:
                      fail(f"bot blob base64 is invalid: {exc}")
                  if len(bot_bytes) != size:
                      fail("bot blob size does not match its tree entry")
                  bot_sha256 = hashlib.sha256(bot_bytes).hexdigest()

          outputs = {
              "submitter": submitter,
              "opponent": "byok-anchor",
              "match_id": run_id,
              "bot_sha256": bot_sha256,
              "pr_number": str(pr_number),
              "head_sha": run_sha,
          }
          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")
          print(
              f"trusted preflight accepted PR #{pr_number} by {submitter} "
              f"at {run_sha[:12]}"
          )
          PY

      - name: Download match artifacts from the verified triggering run
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: match-result
          path: ./artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Require the artifact metadata to match the independently derived spec
        env:
          EXPECTED_SUBMITTER: ${{ steps.meta.outputs.submitter }}
          EXPECTED_OPPONENT: ${{ steps.meta.outputs.opponent }}
          EXPECTED_MATCH_ID: ${{ steps.meta.outputs.match_id }}
          EXPECTED_BOT_SHA256: ${{ steps.meta.outputs.bot_sha256 }}
          EXPECTED_PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          EXPECTED_HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import sys

          root = pathlib.Path("artifacts")
          expected_files = ["match-meta.json", "match-result.json"]
          actual_files = sorted(
              path.relative_to(root).as_posix()
              for path in root.rglob("*")
              if path.is_file() or path.is_symlink()
          )
          if actual_files != expected_files:
              raise SystemExit(
                  f"artifact must contain exactly {expected_files}, got {actual_files}"
              )
          meta_path = root / "match-meta.json"
          result_path = root / "match-result.json"
          if meta_path.is_symlink() or result_path.is_symlink():
              raise SystemExit("artifact files must not be symlinks")
          if meta_path.stat().st_size > 4096:
              raise SystemExit("match-meta.json is oversized")
          if result_path.stat().st_size > 262144:
              raise SystemExit("match-result.json is oversized")
          try:
              meta = json.loads(meta_path.read_text(encoding="utf-8"))
          except (OSError, UnicodeError, json.JSONDecodeError) as exc:
              raise SystemExit(f"match-meta.json is invalid: {exc}") from exc
          expected = {
              "submitter": os.environ["EXPECTED_SUBMITTER"],
              "opponent": os.environ["EXPECTED_OPPONENT"],
              "match_id": os.environ["EXPECTED_MATCH_ID"],
              "bot_sha256": os.environ["EXPECTED_BOT_SHA256"],
              "pr_number": int(os.environ["EXPECTED_PR_NUMBER"]),
              "head_sha": os.environ["EXPECTED_HEAD_SHA"],
          }
          if meta != expected:
              print("artifact metadata does not match GitHub-derived metadata", file=sys.stderr)
              raise SystemExit(1)
          print("artifact metadata exactly matches the independently derived spec")
          PY

      - name: Install hash-locked schema validation dependencies
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PIP_NO_INPUT: "1"
        run: |
          cat > "$RUNNER_TEMP/league-requirements.txt" <<'EOF'
          attrs==26.1.0 \
              --hash=sha256:c647aa4a12dfbad9333ca4e71fe62ddc36f4e63b2d260a37a8b83d2f043ac309
          jsonschema==4.26.0 \
              --hash=sha256:d489f15263b8d200f8387e64b4c3a75f06629559fb73deb8fdfb525f2dab50ce
          jsonschema-specifications==2025.9.1 \
              --hash=sha256:98802fee3a11ee76ecaca44429fda8a41bff98b00a0f2838151b113f210cc6fe
          referencing==0.37.0 \
              --hash=sha256:381329a9f99628c9069361716891d34ad94af76e461dcb0335825aecc7692231
          rpds-py==2026.6.3 \
              --hash=sha256:ecabd69db66de867690f9797f2f8fa27ba501bbc24540cbdbdc649cd15888ba6
          typing-extensions==4.16.0 \
              --hash=sha256:481caa481374e813c1b176ada14e97f1f67a4539ce9cfeb3f350d78d6370c2e8
          EOF
          python -m pip install \
            --require-hashes --only-binary=:all: --no-deps \
            --requirement "$RUNNER_TEMP/league-requirements.txt"

      - name: Persist through a protected bot PR (never push the default branch)
        shell: bash
        env:
          PYTHONPATH: src
          ATV_SUBMITTER: ${{ steps.meta.outputs.submitter }}
          ATV_OPPONENT: ${{ steps.meta.outputs.opponent }}
          ATV_MATCH_ID: ${{ steps.meta.outputs.match_id }}
          ATV_BOT_SHA256: ${{ steps.meta.outputs.bot_sha256 }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          MATCH_RUN_ID: ${{ github.event.workflow_run.id }}
          GH_TOKEN: ${{ secrets.LEAGUE_BOT_TOKEN }}
          LEAGUE_BOT_TOKEN: ${{ secrets.LEAGUE_BOT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${LEAGUE_BOT_TOKEN:-}" ]; then
            echo "LEAGUE_BOT_TOKEN is required for protected bot-PR publication" >&2
            exit 1
          fi

          git config user.name "atv-bench-bot"
          git config user.email "atv-bench-bot@users.noreply.github.com"
          # Keep the token out of the remote URL, .git/config, and Git error output.
          # Git asks this helper for credentials only when talking to github.com.
          askpass="$RUNNER_TEMP/league-git-askpass.sh"
          cat > "$askpass" <<'EOF'
          #!/usr/bin/env bash
          case "${1:-}" in
            *Username*) printf '%s\n' 'x-access-token' ;;
            *Password*) printf '%s\n' "${LEAGUE_BOT_TOKEN:?}" ;;
            *) exit 1 ;;
          esac
          EOF
          chmod 700 "$askpass"
          export GIT_ASKPASS="$askpass"
          export GIT_TERMINAL_PROMPT=0

          branch="league/match-${MATCH_RUN_ID}"
          deadline=$(( $(date +%s) + 420 ))
          attempt=0
          while :; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "bot branch/PR publication did not succeed before the deadline" >&2
              exit 1
            fi
            attempt=$((attempt + 1))

            git fetch origin "$DEFAULT_BRANCH"
            # Record an explicit lease for the run-scoped branch. A fresh workflow
            # runner has no origin/<branch> tracking ref, so bare --force-with-lease
            # cannot safely refresh an existing bot PR on rerun.
            if git fetch origin \
              "refs/heads/${branch}:refs/remotes/origin/${branch}"; then
              branch_lease="$(git rev-parse "refs/remotes/origin/${branch}")"
            else
              branch_lease=""
              git update-ref -d "refs/remotes/origin/${branch}" || true
            fi
            git checkout -B "$branch" "origin/$DEFAULT_BRANCH"
            git clean -fd league/ site/

            python -m atv_bench.publish ingest ./artifacts/match-result.json \
              --store league --require-spec
            python -m atv_bench.publish build \
              --out ./site --store league \
              --updated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            git add -A league/
            if git diff --cached --quiet -- league/; then
              echo "match is already present on the protected default branch"
              exit 0
            fi

            git commit -m "league: record match ${MATCH_RUN_ID}"
            if [ -n "$branch_lease" ]; then
              lease="--force-with-lease=refs/heads/${branch}:${branch_lease}"
            else
              # Empty expected value means "create only if still absent", closing the
              # race where another retry creates the branch after our failed fetch.
              lease="--force-with-lease=refs/heads/${branch}:"
            fi
            if ! git push "$lease" origin "HEAD:refs/heads/${branch}"; then
              backoff=$(( attempt * attempt ))
              [ "$backoff" -gt 30 ] && backoff=30
              sleep "$(( backoff + (RANDOM % 5) ))"
              echo "run-scoped branch push raced; re-fetching and re-ingesting"
              continue
            fi

            pr_number="$(
              gh pr list --repo "$GITHUB_REPOSITORY" --state open \
                --base "$DEFAULT_BRANCH" --head "$branch" \
                --json number --jq '.[0].number // empty'
            )"
            if [ -z "$pr_number" ]; then
              pr_url="$(
                gh pr create --repo "$GITHUB_REPOSITORY" \
                  --base "$DEFAULT_BRANCH" --head "$branch" \
                  --title "league: record match ${MATCH_RUN_ID}" \
                  --body "Automated, independently verified League result from workflow run ${MATCH_RUN_ID}. This PR intentionally remains subject to required checks, CODEOWNERS, and branch protection."
              )"
              pr_number="$(
                gh pr view "$pr_url" --repo "$GITHUB_REPOSITORY" \
                  --json number --jq '.number'
              )"
            fi

            if ! gh pr merge "$pr_number" --repo "$GITHUB_REPOSITORY" \
              --auto --squash; then
              echo "bot PR #${pr_number} is open, but auto-merge could not be enabled." >&2
              echo "Enable repository auto-merge and allow the bot token to manage PRs." >&2
              exit 1
            fi
            echo "opened/refreshed protected bot PR #${pr_number}; merge awaits policy"
            exit 0
          done
