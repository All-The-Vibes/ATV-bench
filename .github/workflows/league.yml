# ATV-bench Community League — two-job security model.
#
# SECURITY MODEL (load-bearing): a submission carries an UNTRUSTED, harness-authored
# bot. We never run it in a job that holds a token or can write Pages.
#
#   match   (untrusted): permissions: {}, no GITHUB_TOKEN, egress blocked, cpu/mem/pid
#                        + time caps, non-root read-only container. Writes ONLY a
#                        schema-shaped result artifact. Gated behind a protected
#                        environment so first-time-contributor runs need approval.
#   publish (trusted):   needs: match. Downloads the artifact, VALIDATES it against
#                        the locked schema, recomputes ELO, builds + deploys the static
#                        board. Never executes bot code or the arena.
#
# A regression in these properties is caught on every push by
# tests/test_action_isolation.py (the CI tripwire), not here at deploy time.

name: league

on:
  pull_request:
    types: [labeled]        # a maintainer adds `run-match` after review

# Concurrency is keyed PER RUN (github.run_id), which is unique — so this group NEVER
# cancels another run. A per-PR group would drop matches: GitHub keeps only one PENDING
# run per group and cancels an older pending run when a newer queues ("any existing
# pending job... will be canceled"; cancel-in-progress:false protects only the
# IN-PROGRESS run, not pending ones), so labeling the same PR `run-match` twice in quick
# succession would cancel the first queued, scoreable match. Each labeled run is a
# distinct match that must complete, so every run gets its own group and none is cancelled.
concurrency:
  group: league-run-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  match:
    # UNTRUSTED job — runs the submitted bot. Zero privileges.
    # Only the labeled-PR path: workflow_dispatch is intentionally NOT a trigger — it has
    # no PR-authored submitter, so the publish job's MatchSpec.from_env would abort with
    # no scoreable identity. A trigger that runs the untrusted bot but can never score it
    # is removed rather than left half-wired.
    if: ${{ github.event.label.name == 'run-match' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions: {}
    # Trusted job outputs (NOT bot-controlled): the sha256 of the exact bot bytes staged
    # into the sandbox. Consumed by the publish job to bind the scored record to the
    # submitted bytes (santa re-review #5). Empty on the fail-closed no-bot/too-large paths
    # (those score a crash forfeit, which carries no bot_sha256).
    outputs:
      bot_sha256: ${{ steps.extract.outputs.bot_sha256 }}
    # Protected environment => first-time contributors need manual approval before
    # the untrusted bot ever executes (GitHub gates entry to environments).
    environment: league-match
    steps:
      - name: Checkout league code (NOT the untrusted PR head, no creds)
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Stage the submitted bot as DATA (never executed here on the host)
        uses: actions/checkout@v4
        with:
          # The PR head is untrusted. We check it out into a SEPARATE path and copy
          # ONLY the bot file into submission/. It is never run on the host — only
          # inside the locked-down sandbox container below. No creds, no token.
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false
          path: pr-src

      - name: Extract the bot file into the sandbox mount dir
        id: extract
        env:
          SUBMITTER: ${{ github.event.pull_request.user.login || 'submitter' }}
          OPPONENT: byok-anchor
          MATCH_ID: ${{ github.run_id }}
        run: |
          mkdir -p submission
          CRASH=$(printf '{"status":"crash","loser":"%s","opponent":"%s","match_id":"%s"}' \
            "$SUBMITTER" "$OPPONENT" "$MATCH_ID")
          # IDENTITY-PINNED: the bot must be exactly the submitter's own path,
          # league/submissions/<submitter>/main.py — NOT the first main.py found
          # anywhere (a PR could otherwise smuggle another identity's bot). Fail closed
          # to a scored crash if that exact file is absent.
          BOT="pr-src/league/submissions/${SUBMITTER}/main.py"
          if [ ! -f "$BOT" ]; then
            echo "$CRASH" > match-result.json
            echo "no bot at $BOT (identity-pinned path required)"; exit 0
          fi
          SZ=$(wc -c < "$BOT")
          if [ "$SZ" -gt 262144 ]; then echo "$CRASH" > match-result.json; echo "bot too large"; exit 0; fi
          cp "$BOT" submission/main.py
          # Bot-identity binding (santa re-review #5): hash the EXACT bytes we mounted into
          # the sandbox and publish it as a TRUSTED job output. The publish job stamps this
          # onto the scored record (never the bot-reported value), so a scored result is
          # provably tied to the submitted bytes and cannot be re-attributed to a later
          # swapped bot under the same login. Computed on trusted staged bytes, not bot
          # stdout — the untrusted bot never influences it.
          echo "bot_sha256=$(sha256sum submission/main.py | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Build the arena image from the TRUSTED in-repo Dockerfile
        run: |
          # Build the sandbox image from arena/Dockerfile in the TRUSTED default-branch
          # checkout (staged at the repo root, NOT the untrusted pr-src/). The image is
          # tagged with a local, run-scoped tag and run by that exact tag below — never
          # the mutable/unbuilt `atv-bench/arena:latest`. This closes santa re-review #2
          # (the ok/scoring path was dead because the referenced image had no producer).
          # The Dockerfile pins its base by digest, so the build is reproducible.
          docker build -t "atv-bench/arena:${{ github.run_id }}" ./arena

      - name: Run bot in a locked-down sandbox container
        # explicit bash: the fallback logic uses ${PIPESTATUS[0]} (a bash builtin) to read
        # the container status through the `head` pipe. GitHub defaults to bash on Linux,
        # but pin it so a runner-default change can't silently break the fail-closed path.
        shell: bash
        env:
          # Match identities from the spec. The submitter is the PR author; the
          # opponent is the baseline anchor for v1. A crash is scored as the
          # submitter forfeiting (loss + reason CRASH), never dropped.
          SUBMITTER: ${{ github.event.pull_request.user.login || 'submitter' }}
          OPPONENT: byok-anchor
          MATCH_ID: ${{ github.run_id }}
        run: |
          # cpu/mem/pid/time caps + no network + non-root + read-only rootfs.
          # The bot cannot exfiltrate (no egress), cannot fork-bomb (--pids-limit),
          # cannot exhaust memory (--memory), cannot escalate (--user, --read-only).
          #
          # stderr -> /dev/null: an untrusted bot's stderr (tracebacks, debug prints,
          # deliberately-planted secrets) would otherwise land in the PUBLIC job log,
          # which GitHub does not mask for bot-sourced strings. Only the stdout JSON
          # result is captured, and only into the artifact — never the log.
          CRASH=$(printf '{"status":"crash","loser":"%s","opponent":"%s","match_id":"%s"}' \
            "$SUBMITTER" "$OPPONENT" "$MATCH_ID")
          # Per-container timeout SHORTER than the job timeout (line 33). A hanging bot
          # must expire HERE and fall through to the CRASH fallback + upload; if it ran
          # to the job-level timeout, GitHub would cancel the whole job before the
          # fallback/upload steps and record NO score (a bot-controlled no-score DoS).
          # Cap stdout to a bounded artifact too (`head -c`): unbounded bot stdout could
          # fill the disk or OOM the trusted publish job's whole-file read.
          #
          # We must NOT let `head` mask the container status: in `a | head > f`, `$?` is
          # head's status, so a bot that prints valid JSON then hangs/exits non-zero would
          # look successful. Capture ${PIPESTATUS[0]} (the timeout/docker status, which
          # `head` does not affect) and fall back to CRASH on ANY non-zero (124 = timeout,
          # or the bot's own non-zero exit). `head` still bounds the on-disk artifact.
          set +e
          timeout 300 docker run --rm \
            --network none \
            --memory 512m --memory-swap 512m \
            --cpus 1 \
            --pids-limit 128 \
            --read-only \
            --user 65534:65534 \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            -v "$PWD/submission:/work:ro" \
            atv-bench/arena:${{ github.run_id }} \
            /work/main.py 2>/dev/null | head -c 65536 > match-result.json
          run_status=${PIPESTATUS[0]}
          # Non-zero container/timeout status or empty output falls back to a trusted,
          # scored CRASH record before upload. The wc-size check is defense-in-depth:
          # `head -c 65536` already caps the file, so this only fires if that ever
          # regresses — it is not the primary size guard.
          if [ "$run_status" -ne 0 ] || [ ! -s match-result.json ] \
             || [ "$(wc -c < match-result.json)" -gt 65536 ]; then
            echo "$CRASH" > match-result.json
          fi

      - name: Validate result is well-formed JSON before upload
        env:
          SUBMITTER: ${{ github.event.pull_request.user.login || 'submitter' }}
          OPPONENT: byok-anchor
          MATCH_ID: ${{ github.run_id }}
        run: |
          # Guard: a bot can exit 0 while printing non-JSON to stdout, which would
          # otherwise be uploaded as a malformed artifact. Replace anything that is
          # not a parseable, known-status record with a schema-complete crash record
          # (loser+opponent+match_id) so the publish side scores it as a forfeit.
          python3 - <<PY
          import json, os, pathlib
          p = pathlib.Path("match-result.json")
          fallback = {"status": "invalid_output",
                      "loser": os.environ["SUBMITTER"],
                      "opponent": os.environ["OPPONENT"],
                      "match_id": os.environ["MATCH_ID"]}
          try:
              data = json.loads(p.read_text())
              assert isinstance(data, dict) and data.get("status") in {"ok", "crash", "invalid_output"}
          except Exception:
              p.write_text(json.dumps(fallback))
              print("bot produced non-JSON / unknown status; replaced with invalid_output record")
          PY

      - name: Upload result artifact (the ONLY output of this job)
        uses: actions/upload-artifact@v4
        with:
          name: match-result
          path: match-result.json
          retention-days: 7

  publish:
    # TRUSTED job — never runs bot code. Consumes the artifact only.
    needs: match
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # NOTE: intentionally NO job-level `concurrency` group. A serializing group would
    # DROP matches, not protect them: GitHub keeps only ONE pending run per concurrency
    # group and cancels an older pending run when a newer one queues (cancel-in-progress
    # protects only the IN-PROGRESS run, not pending ones). With >=3 near-simultaneous
    # publishes, the queued one is cancelled and its already-scored match is lost — the
    # exact bug santa #3 targets. Instead, the persist step below uses an idempotent
    # fetch + re-ingest + retry loop that is race-safe WITHOUT serialization and never
    # drops a match. See tests/test_publish_race.py.
    permissions:
      contents: write   # commit the ingested match back to league/ (durable history)
      pages: write
      id-token: write   # required by actions/deploy-pages OIDC (Pages only)
    environment:
      name: github-pages
    steps:
      - name: Checkout TRUSTED league code (pinned to default branch, never PR head)
        uses: actions/checkout@v4
        with:
          # persist-credentials default (true) so the commit-back can push. This is
          # the TRUSTED job on the default branch — it never runs bot code, and the
          # checkout is pinned to the default branch (not the PR ref), so the token is
          # never exposed to untrusted code.
          ref: ${{ github.event.repository.default_branch }}

      - name: Download match result artifact
        uses: actions/download-artifact@v4
        with:
          name: match-result
          path: ./artifacts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned deps (NOT an editable install of checked-out code)
        run: |
          # Do NOT `pip install -e .` — that executes the package's build hooks. We
          # only need the runtime deps to run atv_bench as a module from the trusted
          # checkout via PYTHONPATH=src.
          pip install "jsonschema>=4.0"

      - name: Ingest result into history (SINGLE fail-closed scoring gate)
        env:
          PYTHONPATH: src
          # TRUSTED match spec from GitHub context — NOT from the untrusted bot's stdout.
          # --require-spec binds the ok artifact's player_a/player_b/match_id to these
          # exact values; a bot that forged a third-party identity or a fabricated
          # match_id is rebound to a CRASH forfeit against the submitter (never trusted,
          # never dropped). Must match the identities the match job pitted them against.
          # No `|| 'submitter'` fallback here: on a non-PR context the login is blank and
          # MatchSpec.from_env fails closed rather than inventing a phantom entrant.
          #
          # This is the ONLY validation gate: ingest --require-spec validates internally
          # and converts ANY malformed/invalid artifact into a spec-bound submitter
          # forfeit. A separate hard-failing `validate` step is deliberately NOT run — it
          # would let a bot emit a known-status-but-invalid artifact to abort the whole
          # job and record NO score (a bot-controlled no-score DoS). match_id is stable
          # (github.run_id, no run_attempt) so a publish re-run reuses the same spec and
          # never rebinds an honest earlier-attempt artifact into a forfeit.
          ATV_SUBMITTER: ${{ github.event.pull_request.user.login }}
          ATV_OPPONENT: byok-anchor
          ATV_MATCH_ID: ${{ github.run_id }}
          # Trusted bot-bytes hash from the match job (santa re-review #5). Stamped onto
          # the scored record so it is provably tied to the submitted bytes; a bot that
          # reports a disagreeing bot_sha256 is rebound to a forfeit. Empty on crash paths.
          ATV_BOT_SHA256: ${{ needs.match.outputs.bot_sha256 }}
        run: python -m atv_bench.publish ingest ./artifacts/match-result.json --store league --require-spec

      - name: Recompute ELO from full history + build static board
        env:
          PYTHONPATH: src
        run: |
          # Build (which validates the whole board) BEFORE committing the store, so a
          # poison/invalid artifact fails here and is never persisted to the branch.
          python -m atv_bench.publish build \
            --out ./site --store league \
            --updated-at "$(git show -s --format=%cI HEAD)"

      - name: Persist match history back to the default branch (durable store)
        # explicit bash: the loop uses `$RANDOM` (a bash builtin) for jitter. GitHub
        # defaults to bash on Linux, but pin it so a runner-default change can't break the
        # backoff — mirrors the match job's `shell: bash` pin.
        shell: bash
        env:
          PYTHONPATH: src
          ATV_SUBMITTER: ${{ github.event.pull_request.user.login }}
          ATV_OPPONENT: byok-anchor
          ATV_MATCH_ID: ${{ github.run_id }}
          # Trusted bot-bytes hash from the match job (santa re-review #5). Stamped onto
          # the scored record so it is provably tied to the submitted bytes; a bot that
          # reports a disagreeing bot_sha256 is rebound to a forfeit. Empty on crash paths.
          ATV_BOT_SHA256: ${{ needs.match.outputs.bot_sha256 }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # Commit the ingested match back to the trusted default branch so
          # recompute-from-history persists. Safe: trusted publish job, default branch,
          # never touches bot code.
          #
          # santa re-review #3: a single-shot push drops the match on a non-fast-forward
          # race (another PR's publish pushed first). We use OPTIMISTIC CONCURRENCY, which
          # is race-safe WITHOUT a serializing GitHub concurrency group. A constant-group
          # `concurrency:` would itself DROP matches: GitHub keeps only one PENDING run per
          # group and "any existing pending job... will be canceled" when a newer run
          # queues (cancel-in-progress:false protects only the IN-PROGRESS run, not pending
          # ones) — so a burst of publishes silently loses the cancelled ones. Instead, on
          # each attempt we reset to the freshly-fetched trusted branch, RE-INGEST this
          # match on top (idempotent — matches.jsonl dedups on the stable github.run_id
          # match_id), rebuild, then push. A rejected push re-fetches and re-applies.
          #
          # The retry is DEADLINE-bounded with exponential backoff + jitter (not a small
          # fixed count): under a bursty label storm only one publish wins per push round,
          # so a fixed 5-attempt cap could exhaust and fail a job with its match unpushed.
          # Retrying until a generous deadline (well inside the 10-min job timeout) means
          # every scored match persists rather than needing a manual re-run; if the
          # deadline IS hit the step fails closed (exit 1, loud + re-runnable), never
          # silently dropping a match.
          #
          # NOTE: league/matches.jsonl is UNTRACKED until the first match, and
          # `git diff --quiet -- league/` IGNORES untracked files. So we always stage
          # with `git add -A league/` first and detect real changes via `git diff
          # --cached`, never a bare pre-stage `git diff --quiet` (which would silently
          # drop the very first match).
          git config user.name "atv-bench-bot"
          git config user.email "atv-bench-bot@users.noreply.github.com"

          deadline=$(( $(date +%s) + 420 ))   # ~7 min budget, inside the 10-min job timeout
          attempt=0
          while :; do
            # Check the deadline at the TOP so a long backoff sleep can't carry the clock
            # past the budget into another full attempt. Fail closed (exit 1) if exhausted.
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "store push did not succeed within the deadline after $attempt attempts" >&2
              exit 1
            fi
            attempt=$((attempt + 1))

            # Reset hard to the latest trusted branch, INCLUDING untracked store files, so
            # each attempt re-applies from a clean, current origin state (never stale local
            # files). Scoped to league/; -fd (no -x) so a future gitignored path elsewhere
            # is never wiped, and the gitignored build output ./site (outside league/) is
            # untouched.
            git fetch origin "$DEFAULT_BRANCH"
            git reset --hard "origin/$DEFAULT_BRANCH"
            git clean -fd league/

            # Re-apply THIS match onto the fresh store, then rebuild the board. --updated-at
            # is the CURRENT time so the board reflects the match just recorded (not the
            # previous store commit's time).
            python -m atv_bench.publish ingest ./artifacts/match-result.json \
              --store league --require-spec
            python -m atv_bench.publish build \
              --out ./site --store league \
              --updated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            # Stage EVERYTHING under league/ (tracked + untracked matches.jsonl), then
            # detect changes on the STAGED tree (git diff --cached sees untracked-now-added
            # files, unlike `git diff --quiet -- league/`).
            git add -A league/
            if git diff --cached --quiet -- league/; then
              echo "match already present in latest store; nothing to push"
              exit 0
            fi

            git commit -m "league: record match ${{ github.run_id }} [skip ci]"
            if git push origin "HEAD:$DEFAULT_BRANCH"; then
              echo "store push succeeded on attempt $attempt"
              exit 0
            fi

            # Exponential backoff capped at 30s, plus jitter, so concurrent publishers
            # de-synchronize instead of colliding on every round. The deadline is checked
            # at the top of the loop, so a backoff that overshoots it exits cleanly there.
            backoff=$(( attempt * attempt ))
            [ "$backoff" -gt 30 ] && backoff=30
            sleep "$(( backoff + (RANDOM % 5) ))"
            echo "push rejected (race on attempt $attempt); backed off, re-fetching"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
