# Live integration suite — NOT run on every push. Exercises the real vendored
# CodeClash arena (submodule at CODECLASH_PIN) plus the Playwright-driven live
# board, so it needs the submodule checked out, the `run` + `dev` extras, and a
# Chromium install. Gated to manual dispatch / main so the hermetic `ci.yml`
# stays the fast tripwire.

name: live-integration

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # Pre-merge tripwire for the `.[run]` import contract. Runs on every PR (unlike the
  # heavy live suite below, which is push-to-main/manual only) so a broken CodeClash
  # import or a missing `run` dependency is caught BEFORE merge, not after. No Docker and
  # no Playwright — just the submodule + `.[run,dev]` install and the integration-marked
  # import/provisioning contracts.
  import-smoke:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Init submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install (run + dev extras)
        run: pip install -e '.[run,dev]'

      - name: CodeClash import + provisioning contract (no Docker / no e2e)
        run: pytest tests/test_provisioning.py -q

  live-integration:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Init submodules
        run: git submodule update --init --recursive

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install (run + dev extras)
        run: pip install -e '.[run,dev]'

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Live integration / e2e / drift suite
        run: pytest -m 'integration or e2e or drift' -q
