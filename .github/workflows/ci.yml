# Fast hermetic CI — runs on every push/PR. No Docker, no live CLIs, no secrets.
# This is the tripwire suite: the fingerprint canary leak-test, the Action-perms
# isolation test, ELO determinism, and the leaderboard schema contract all run here,
# so a security or contract regression fails CI before it can merge.

name: ci

on:
  push:
    branches: [main, master, "feat/**"]
  pull_request:

permissions:
  contents: read

jobs:
  hermetic:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e '.[dev]'
      - name: Hermetic test suite (unit + isolation + leak canary)
        run: pytest -m "not live and not integration" -q
      - name: Verify committed schema matches in-code schema
        run: |
          python - <<'PY'
          import json
          from atv_bench.leaderboard import LEADERBOARD_SCHEMA
          on_disk = json.loads(open("leaderboard/schema.json").read())
          assert on_disk == LEADERBOARD_SCHEMA, "leaderboard/schema.json drifted from code"
          print("schema in sync")
          PY
