# Fast hermetic CI — runs on every push/PR. No Docker, no live CLIs, no secrets.
# This is the tripwire suite: the fingerprint canary leak-test, the Action-perms
# isolation test, ELO determinism, and the leaderboard schema contract all run here,
# so a security or contract regression fails CI before it can merge.

name: ci

on:
  push:
    branches: [main, master, "feat/**"]
  pull_request:

permissions:
  contents: read

jobs:
  hermetic:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e '.[dev]'
      - name: Hermetic test suite (unit + isolation + leak canary)
        run: pytest -m "not live and not integration" -q
      - name: Verify committed schema matches in-code schema
        run: |
          python - <<'PY'
          import json
          from atv_bench.leaderboard import LEADERBOARD_SCHEMA
          on_disk = json.loads(open("leaderboard/schema.json").read())
          assert on_disk == LEADERBOARD_SCHEMA, "leaderboard/schema.json drifted from code"
          print("schema in sync")
          PY

  # Always-on community-PR confinement (santa round-7): a REQUIRED check on every PR, not a
  # side effect of the labeled run-match workflow. A submission PR (one touching
  # league/submissions/**) may ONLY add/modify its own
  # league/submissions/<author>/{main.py,submission.json}. Renames, deletes, other entrants'
  # dirs, league/matches.jsonl, and — critically — .github/workflows/** (the pwn-request
  # vector where a PR rewrites the workflow that scores it) all fail closed BEFORE merge.
  # A pure plumbing PR (no submissions/**) is not confined and passes for normal review.
  pr-path-guard:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e '.'
      - name: Confine community submission PRs to their own files
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # checkout used fetch-depth:0 (full history), so the merge base is present.
          # Do NOT re-fetch --depth=1 here: grafting a shallow boundary onto BASE_SHA
          # breaks `merge-base`, which makes the three-dot diff below fail with
          # "no merge base" on an ordinary PR (see PR #15). Ensure the base commit is
          # present without shallowing, then diff.
          git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null \
            || git fetch --no-tags origin "$BASE_SHA"
          # Three-dot: files the PR changed since it diverged from base (not every path
          # where the branches differ). name-status surfaces rename/copy/delete so the
          # gate can reject them and see both sides of a rename.
          git diff --name-status "$BASE_SHA"..."$HEAD_SHA" > changes.txt
          echo "PR name-status:"; cat changes.txt
          python -m atv_bench.cli validate-pr-paths --author "$AUTHOR" \
            --name-status --paths-file changes.txt
