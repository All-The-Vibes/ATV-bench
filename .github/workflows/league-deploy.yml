# ATV-bench Community League — Pages DEPLOY workflow (settled-store, race-free).
#
# G4/G5 (santa round-2): Pages deploy used to live inside league-publish.yml. A head-SHA
# fence proved the artifact was built from the settled head, but the separate upload step
# ran later, so origin could advance again — a slower older run could still deploy stale.
#
# league-publish now opens a protected bot PR instead of pushing the default branch. A
# completed publish run therefore does NOT mean the store has settled yet: required checks
# and CODEOWNERS may still be pending. The deploy job runs only on the eventual default-
# branch push (the merged bot PR or another reviewed board/store change). The legacy
# workflow_run trigger remains declared for compatibility, but the job-level guard makes it
# a no-op so it cannot deploy a pre-merge stale board.

name: league-deploy

on:
  workflow_run:
    workflows: [league-publish]
    types: [completed]
  push:
    branches: [main, master]
    paths:
      - "league/**"
      - "leaderboard/**"
      # H5 (santa round-3): the board HTML is generated by these modules. A fix to the
      # generator must redeploy the LIVE board, else production serves stale logic until
      # some later store change happens to retrigger a deploy.
      - "src/atv_bench/publish.py"
      - "src/atv_bench/leaderboard.py"
      - "src/atv_bench/store.py"
      - "src/atv_bench/elo.py"
      # leaderboard._sanitized_details imports the scanner to scrub published fields, so a
      # scanner/security fix is on the live board-build path too (santa round-6).
      - "src/atv_bench/fingerprint/scan.py"
      - ".github/workflows/league-deploy.yml"

# Newest settled-store deploy wins: an older in-flight deploy is cancelled so the board
# never regresses to a stale snapshot (closes the G4 residual window).
concurrency:
  group: pages
  cancel-in-progress: true

permissions: {}

jobs:
  deploy:
    # A publish workflow_run only means "bot PR opened"; only a default-branch push means
    # the protected store actually changed.
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write   # required by actions/deploy-pages OIDC (Pages only)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout the settled default branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Always build from the settled default-branch head. On a push event that IS the
          # triggering commit; on a workflow_run event we pin the default branch explicitly
          # so the deploy reflects the store as persisted by the publish run (plus anything
          # that landed since — last-write-wins via the concurrency group).
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install hash-locked schema validation dependencies
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PIP_NO_INPUT: "1"
        run: |
          cat > "$RUNNER_TEMP/league-requirements.txt" <<'EOF'
          attrs==26.1.0 \
              --hash=sha256:c647aa4a12dfbad9333ca4e71fe62ddc36f4e63b2d260a37a8b83d2f043ac309
          jsonschema==4.26.0 \
              --hash=sha256:d489f15263b8d200f8387e64b4c3a75f06629559fb73deb8fdfb525f2dab50ce
          jsonschema-specifications==2025.9.1 \
              --hash=sha256:98802fee3a11ee76ecaca44429fda8a41bff98b00a0f2838151b113f210cc6fe
          referencing==0.37.0 \
              --hash=sha256:381329a9f99628c9069361716891d34ad94af76e461dcb0335825aecc7692231
          rpds-py==2026.6.3 \
              --hash=sha256:ecabd69db66de867690f9797f2f8fa27ba501bbc24540cbdbdc649cd15888ba6
          typing-extensions==4.16.0 \
              --hash=sha256:481caa481374e813c1b176ada14e97f1f67a4539ce9cfeb3f350d78d6370c2e8
          EOF
          python -m pip install \
            --require-hashes --only-binary=:all: --no-deps \
            --requirement "$RUNNER_TEMP/league-requirements.txt"

      - name: Build the board from the settled store
        shell: bash
        env:
          PYTHONPATH: src
        run: |
          # The checked-out default-branch head is the settled store; ./site is built from
          # exactly that state. The pages concurrency group ensures the newest deploy wins.
          python -m atv_bench.publish build \
            --out ./site --store league \
            --updated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
