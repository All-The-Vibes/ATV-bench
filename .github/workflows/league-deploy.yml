# ATV-bench Community League — Pages DEPLOY workflow (settled-store, race-free).
#
# G4/G5 (santa round-2): Pages deploy used to live inside league-publish.yml. A head-SHA
# fence proved the artifact was built from the settled head, but the separate upload step
# ran later, so origin could advance again — a slower older run could still deploy stale.
#
# R1 (santa round-5): the round-2 fix triggered deploy on `push`. But league-publish.yml
# persists the match with the default GITHUB_TOKEN, and GitHub deliberately does NOT trigger
# workflow runs from GITHUB_TOKEN pushes (recursion prevention) — so a scored match would
# persist but never redeploy the live board. Only human pushes (a merged PR) would fire it.
#
# THE FIX: trigger on BOTH
#   - `workflow_run` when league-publish completes — fires reliably after every scored match
#     (workflow_run is NOT subject to the GITHUB_TOKEN-push suppression); AND
#   - `push` to the default branch — covers a merged submission PR (or a direct board-code
#     change) that lands without a match run.
# Either way the job checks out the freshly-settled default-branch head and rebuilds ./site
# from exactly that store. A `pages` concurrency group with cancel-in-progress makes the
# newest deploy supersede any older in-flight one (last-write-wins) — no stale board, no
# TOCTOU. The job runs only trusted default-branch code, never PR head / bot code, and never
# does an editable install (no build hooks).

name: league-deploy

on:
  workflow_run:
    workflows: [league-publish]
    types: [completed]
  push:
    branches: [main, master]
    paths:
      - "league/**"
      - "leaderboard/**"
      # H5 (santa round-3): the board HTML is generated by these modules. A fix to the
      # generator must redeploy the LIVE board, else production serves stale logic until
      # some later store change happens to retrigger a deploy.
      - "src/atv_bench/publish.py"
      - "src/atv_bench/leaderboard.py"
      - "src/atv_bench/store.py"
      - "src/atv_bench/elo.py"
      # leaderboard._sanitized_details imports the scanner to scrub published fields, so a
      # scanner/security fix is on the live board-build path too (santa round-6).
      - "src/atv_bench/fingerprint/scan.py"
      - ".github/workflows/league-deploy.yml"

# Newest settled-store deploy wins: an older in-flight deploy is cancelled so the board
# never regresses to a stale snapshot (closes the G4 residual window).
concurrency:
  group: pages
  cancel-in-progress: true

permissions: {}

jobs:
  deploy:
    # For the workflow_run trigger, only deploy after a SUCCESSFUL publish (a failed publish
    # persisted nothing new). The push trigger has no workflow_run context, so allow it too.
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write   # required by actions/deploy-pages OIDC (Pages only)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout the settled default branch
        uses: actions/checkout@v4
        with:
          # Always build from the settled default-branch head. On a push event that IS the
          # triggering commit; on a workflow_run event we pin the default branch explicitly
          # so the deploy reflects the store as persisted by the publish run (plus anything
          # that landed since — last-write-wins via the concurrency group).
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned deps (NOT an editable install of checked-out code)
        run: |
          # Do NOT `pip install -e .` — that executes the package's build hooks. We only
          # need the runtime deps to run atv_bench as a module from the trusted checkout.
          pip install "jsonschema>=4.0"

      - name: Build the board from the settled store
        shell: bash
        env:
          PYTHONPATH: src
        run: |
          # The checked-out default-branch head is the settled store; ./site is built from
          # exactly that state. The pages concurrency group ensures the newest deploy wins.
          python -m atv_bench.publish build \
            --out ./site --store league \
            --updated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
