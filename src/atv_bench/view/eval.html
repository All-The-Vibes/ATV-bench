<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'">
  <title>ATV Evaluation Report</title>
  <style>
    :root{color-scheme:dark;--bg:#0a0d12;--panel:#121823;--line:#283244;--text:#edf3ff;--muted:#9ba9bd;--accent:#73d7ff;--good:#6ee7a8;--warn:#ffd166;--bad:#ff7b8a}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#162238 0,#0a0d12 34rem);color:var(--text);font:14px/1.5 ui-monospace,SFMono-Regular,Consolas,monospace}
    main{max-width:1280px;margin:auto;padding:28px}.top{display:flex;gap:20px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
    h1,h2,h3{margin:.2em 0}h1{font-size:28px}h2{font-size:20px;margin-top:30px}h3{font-size:15px}
    .muted{color:var(--muted)}.panel{background:rgba(18,24,35,.94);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:14px;overflow:auto}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}.metric{padding:12px;border:1px solid var(--line);border-radius:9px;background:#0d121b}
    .metric b{display:block;font-size:18px;color:var(--accent)}.badge{display:inline-block;padding:3px 8px;border-radius:99px;border:1px solid var(--line);margin:2px 4px 2px 0}
    .official{color:var(--good);border-color:#2c7551}.unofficial{color:var(--warn);border-color:#7b6425}.bad{color:var(--bad);border-color:#793846}
    table{width:100%;border-collapse:collapse;min-width:720px}th,td{text-align:left;padding:8px;border-bottom:1px solid var(--line);vertical-align:top}th{color:var(--muted);font-weight:600}
    button,input{font:inherit;color:var(--text);background:#111927;border:1px solid var(--line);border-radius:7px;padding:8px}button{cursor:pointer}
    a{color:var(--accent)}ul{padding-left:20px}.empty{padding:30px;text-align:center;color:var(--muted)}.track{margin-top:24px}.conclusion{border-left:4px solid var(--accent)}
    .winner{border-left-color:var(--good)}.inconclusive{border-left-color:var(--warn)}.error{white-space:pre-wrap;color:var(--bad)}
    @media(max-width:700px){main{padding:16px}h1{font-size:23px}}
  </style>
</head>
<body>
<main>
  <div class="top">
    <div><h1>ATV Evaluation Report</h1><div id="version-line" class="muted">Offline canonical evidence viewer</div></div>
    <label>Load report.json <input id="file-input" type="file" accept="application/json,.json"></label>
  </div>
  <div id="error" class="panel error" hidden></div>
  <section id="summary"></section>
  <section id="tracks"></section>
  <section id="evidence"></section>
</main>
<script id="report-data" type="application/json">"__ATV_REPORT_JSON__"</script>
<script>
"use strict";
const byId=id=>document.getElementById(id);
const arr=value=>Array.isArray(value)?value:[];
const obj=value=>value&&typeof value==="object"&&!Array.isArray(value)?value:{};
const node=(tag,text,className)=>{const n=document.createElement(tag);if(text!==undefined&&text!==null)n.textContent=String(text);if(className)n.className=className;return n};
const add=(parent,...children)=>{for(const child of children)if(child)parent.appendChild(child);return parent};
const fmt=value=>value===null||value===undefined?"—":typeof value==="number"?(Number.isInteger(value)?String(value):value.toFixed(4)):String(value);
const pct=value=>value===null||value===undefined?"—":`${(Number(value)*100).toFixed(1)}%`;
function badge(text,kind){return node("span",text,`badge ${kind||""}`)}
function safeHref(value){if(typeof value!=="string"||!value)return null;try{const url=new URL(value,location.href);return["http:","https:","file:"].includes(url.protocol)?url.href:null}catch{return null}}
function metricGrid(metrics){const grid=node("div",null,"grid");const labels={trial_count:"Trials",task_success_rate:"Task success",graded_result_rate:"Graded",reliability_rate:"Reliability",infrastructure_error_rate:"Infrastructure errors",crash_rate:"Crashes",timeout_rate:"Timeouts",mean_score:"Mean score",mean_cost_microusd:"Mean cost (micro-USD)",mean_duration_ms:"Mean duration (ms)"};for(const [key,label] of Object.entries(labels)){const card=node("div",null,"metric");const value=obj(metrics)[key];add(card,node("span",label,"muted"),node("b",key.endsWith("_rate")||key==="mean_score"?pct(value):fmt(value)));grid.appendChild(card)}return grid}
function table(headers,rows){const t=node("table"),thead=node("thead"),tr=node("tr");headers.forEach(h=>tr.appendChild(node("th",h.label)));thead.appendChild(tr);t.appendChild(thead);const body=node("tbody");for(const row of rows){const line=node("tr");headers.forEach(h=>{const cell=node("td");const value=h.render?h.render(row):row[h.key];if(value instanceof Node)cell.appendChild(value);else cell.textContent=fmt(value);line.appendChild(cell)});body.appendChild(line)}t.appendChild(body);return t}
function renderSummary(report){const root=byId("summary");root.replaceChildren();const conclusion=obj(report.global_conclusion);const panel=node("div",null,`panel conclusion ${conclusion.status==="winner"?"winner":"inconclusive"}`);add(panel,node("h2","Global conclusion"),badge(conclusion.status||"no-data",conclusion.status==="winner"?"official":conclusion.status==="inconclusive"?"unofficial":""),node("p",conclusion.language||"No conclusion available."));if(conclusion.winner)add(panel,node("p",`Winner: ${conclusion.winner}`));const failures=arr(conclusion.gate_failures);if(failures.length){const list=node("ul");failures.forEach(f=>list.appendChild(node("li",`${f.code}: ${f.message}`)));add(panel,node("h3","Gate failures"),list)}root.appendChild(panel);const integrity=obj(report.integrity);const contamination=obj(integrity.contamination),retraction=obj(integrity.retraction);const meta=node("div",null,"panel grid");for(const [label,value] of [["Contamination",contamination.status],["Retraction",retraction.status],["Report",report.report_version],["Generated",report.generated_at]]){const card=node("div",null,"metric");add(card,node("span",label,"muted"),node("b",value||"—"));meta.appendChild(card)}root.appendChild(meta);const versions=obj(report.versions);const detail=node("div",null,"panel");add(detail,node("h3","Version and integrity scope"),node("p",`Benchmark releases: ${arr(versions.benchmark_releases).join(", ")||"none"}`),node("p",`Protocol versions: ${arr(versions.protocol_versions).join(", ")||"none"}`),node("p",`Task sets: ${arr(versions.task_sets).map(v=>`${v.id}@${v.version}#${String(v.manifest_digest).slice(0,12)}`).join(", ")||"none"}`),node("p",`Runners: ${arr(versions.runners).map(v=>`${v.id}@${v.version}#${String(v.manifest_digest).slice(0,12)}`).join(", ")||"none"}`),node("p",`Contamination note: ${contamination.note||"none"}`,"muted"),node("p",`Retraction note: ${retraction.note||"none"}`,"muted"));root.appendChild(detail);byId("version-line").textContent=`Report ${report.report_version||"unknown"} · ${arr(versions.benchmark_releases).join(", ")||"no benchmark release"}`}
function breakdownPanel(title,rows){const panel=node("div",null,"panel");add(panel,node("h3",title));if(!rows.length){panel.appendChild(node("div","No data","empty"));return panel}panel.appendChild(table([{key:"key",label:"Key"},{key:"trial_count",label:"Trials"},{key:"task_success_rate",label:"Success",render:r=>pct(r.task_success_rate)},{key:"reliability_rate",label:"Reliability",render:r=>pct(r.reliability_rate)},{key:"mean_cost_microusd",label:"Mean cost"},{key:"mean_duration_ms",label:"Mean ms"}],rows));return panel}
function renderTrack(track){const section=node("section",null,"track");add(section,node("h2",track.label||track.id||"Track"),node("p",track.interpretation||"","muted"));const official=arr(track.official_results),unofficial=arr(track.unofficial_results);add(section,badge(`${official.length} official`,"official"),badge(`${unofficial.length} unofficial`,"unofficial"));const officialPanel=node("div",null,"panel");add(officialPanel,node("h3","Official metrics"),metricGrid(obj(obj(track.metrics).official)));section.appendChild(officialPanel);const unofficialPanel=node("div",null,"panel");add(unofficialPanel,node("h3","Unofficial metrics"),node("p","Local and community evidence is displayed separately and cannot determine an official winner.","muted"),metricGrid(obj(obj(track.metrics).unofficial)));section.appendChild(unofficialPanel);const breakdowns=obj(obj(track.breakdowns).official);section.appendChild(breakdownPanel("Task breakdown",arr(breakdowns.tasks)));section.appendChild(breakdownPanel("Category breakdown",arr(breakdowns.categories)));section.appendChild(breakdownPanel("Model-policy breakdown",arr(breakdowns.model_policies)));section.appendChild(breakdownPanel("Budget breakdown",arr(breakdowns.budgets)));const summaries=arr(track.analysis_summaries),sp=node("div",null,"panel");add(sp,node("h3","Task-clustered paired analysis"));if(summaries.length)sp.appendChild(table([{key:"model_policy",label:"Model policy"},{key:"harness_a",label:"A"},{key:"harness_b",label:"B"},{key:"mean_difference",label:"Effect"},{key:"ci_low",label:"CI low"},{key:"ci_high",label:"CI high"},{key:"practical_margin",label:"Practical margin"},{key:"descriptive_decision",label:"Descriptive"},{key:"publication_decision",label:"Publication"},{key:"publication_eligible",label:"Eligible",render:r=>badge(r.publication_eligible?"yes":"no",r.publication_eligible?"official":"unofficial")}],summaries));else sp.appendChild(node("div","No paired analysis","empty"));section.appendChild(sp);const effects=arr(track.paired_effects);const ep=node("div",null,"panel");add(ep,node("h3","Paired task effects"));if(effects.length)ep.appendChild(table([{key:"task_id",label:"Task"},{key:"model_policy",label:"Model policy"},{key:"harness_a",label:"A"},{key:"harness_b",label:"B"},{key:"difference",label:"A − B"},{key:"repetitions",label:"Trials",render:r=>arr(r.repetitions).length},{key:"official",label:"Trust",render:r=>badge(r.official?"official":"unofficial",r.official?"official":"unofficial")}],effects));else ep.appendChild(node("div","No paired effects","empty"));section.appendChild(ep);const exclusions=arr(track.infrastructure_exclusions);if(exclusions.length){const xp=node("div",null,"panel");add(xp,node("h3","Infrastructure exclusions"),table([{key:"task_id",label:"Task"},{key:"harness_id",label:"Harness"},{key:"status",label:"Status"},{key:"model_policy",label:"Model policy"},{key:"official",label:"Trust",render:r=>badge(r.official?"official":"unofficial",r.official?"official":"unofficial")}],exclusions));section.appendChild(xp)}const taxonomy=obj(track.failure_taxonomy),failureRows=[...arr(taxonomy.official).map(r=>({...r,trust:"official"})),...arr(taxonomy.unofficial).map(r=>({...r,trust:"unofficial"}))];if(failureRows.length){const tp=node("div",null,"panel");add(tp,node("h3","Failure taxonomy"),table([{key:"code",label:"Code"},{key:"scope",label:"Scope"},{key:"infrastructure",label:"Infrastructure"},{key:"count",label:"Count"},{key:"trust",label:"Trust"}],failureRows));section.appendChild(tp)}const failures=arr(track.quality_gate_failures);if(failures.length){const fp=node("div",null,"panel");add(fp,node("h3","Quality gate failures"));const list=node("ul");failures.forEach(f=>list.appendChild(node("li",`${f.model_policy}: ${f.code} — ${f.message}`)));fp.appendChild(list);section.appendChild(fp)}return section}
function renderTracks(report){const root=byId("tracks");root.replaceChildren();const tracks=obj(report.tracks);for(const id of ["controlled","systems","resilience"])root.appendChild(renderTrack(obj(tracks[id])))}
function renderEvidence(report){const root=byId("evidence");root.replaceChildren();add(root,node("h2","Raw canonical evidence"));const rows=arr(report.evidence);const panel=node("div",null,"panel");if(!rows.length){panel.appendChild(node("div","No evidence bundles supplied.","empty"));root.appendChild(panel);return}panel.appendChild(table([{key:"evidence_id",label:"Bundle"},{key:"trust_tier",label:"Trust",render:r=>badge(r.trust_tier,r.official?"official":"unofficial")},{key:"track",label:"Track"},{key:"task_id",label:"Task"},{key:"harness_id",label:"Harness"},{key:"model_policy_key",label:"Model policy"},{key:"bundle_digest",label:"Digest"},{key:"bundle_url",label:"Raw evidence",render:r=>{const href=safeHref(r.bundle_url);if(!href)return node("span","offline","muted");const a=node("a","open");a.href=href;a.target="_blank";a.rel="noopener noreferrer";return a}}],rows));root.appendChild(panel)}
function render(report){if(!report||typeof report!=="object"||Array.isArray(report)){showError("Report payload is empty or invalid.");report={schema:"atv.eval-report/v1",tracks:{},global_conclusion:{status:"no-data",language:"No report data."},evidence:[],versions:{},integrity:{}}}else hideError();renderSummary(report);renderTracks(report);renderEvidence(report)}
function showError(message){const box=byId("error");box.hidden=false;box.textContent=String(message)}function hideError(){byId("error").hidden=true;byId("error").textContent=""}
byId("file-input").addEventListener("change",event=>{const file=event.target.files&&event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{render(JSON.parse(String(reader.result)))}catch(error){showError(error)}};reader.onerror=()=>showError("Could not read the selected file.");reader.readAsText(file)});
try{const raw=byId("report-data").textContent.trim();const parsed=JSON.parse(raw);render(parsed===("__ATV_"+"REPORT_JSON__")?null:parsed)}catch(error){showError(error);render(null)}
</script>
</body>
</html>
