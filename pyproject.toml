[project]
name = "atv-bench"
version = "0.1.0"
description = "A harness benchmark for coding agents (CodeClash-inspired, harness-as-unit)"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/atv_bench"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
markers = [
  "spike: end-to-end spike tests that invoke real CLIs (may be slow / need auth)",
  "live: requires live CLI auth and network",
]
